<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="16" y1="8" x2="118" y2="121">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="14" y1="54" x2="114" y2="114">
      <stop offset="0" stop-color="#A08868"/>
      <stop offset=".4" stop-color="#7A5C3C"/>
      <stop offset="1" stop-color="#3D2B1A"/>
    </linearGradient>
    <radialGradient id="coinFace" cx="40%" cy="32%" r="65%">
      <stop offset="0" stop-color="#FFFDE7"/>
      <stop offset=".2" stop-color="#FFE082"/>
      <stop offset=".45" stop-color="#FFB300"/>
      <stop offset=".75" stop-color="#FF8F00"/>
      <stop offset="1" stop-color="#BF360C"/>
    </radialGradient>
    <radialGradient id="coinSmall" cx="40%" cy="32%" r="65%">
      <stop offset="0" stop-color="#FFE082"/>
      <stop offset=".4" stop-color="#FFB300"/>
      <stop offset=".75" stop-color="#FF8F00"/>
      <stop offset="1" stop-color="#E65100"/>
    </radialGradient>
    <filter id="lipShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="coinShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" fill="url(#bg)"/>
  <!-- Wallet back -->
  <rect x="12" y="54" width="104" height="60" rx="16" fill="url(#walletGrad)"/>
  <!-- Interior gap (opening) -->
  <rect x="12" y="54" width="104" height="14" rx="6" fill="#2A1A0E" opacity=".7"/>
  <rect x="12" y="62" width="104" height="5" fill="#1A0E06" opacity=".5"/>
  <!-- Coin 2 (dropping in from above) -->
  <g filter="url(#coinShadow)" transform="rotate(-20 46 34)">
    <circle cx="46" cy="34" r="17" fill="url(#coinFace)" stroke="#FFE082" stroke-width="1.5"/>
    <text x="46" y="42" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="700" fill="#4E2E00" text-anchor="middle">¥</text>
    <ellipse cx="38" cy="26" rx="7" ry="3.5" fill="white" opacity=".2" transform="rotate(-20 38 26)"/>
  </g>
  <!-- Coin 1 (main, going into wallet) -->
  <g filter="url(#coinShadow)">
    <circle cx="68" cy="50" r="24" fill="url(#coinFace)" stroke="#FFE082" stroke-width="2"/>
    <circle cx="68" cy="50" r="20" fill="none" stroke="#FFF8E1" stroke-width=".6" opacity=".3"/>
    <text x="68" y="61" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700" fill="#4E2E00" text-anchor="middle">¥</text>
    <ellipse cx="57" cy="38" rx="10" ry="5" fill="white" opacity=".2" transform="rotate(-20 57 38)"/>
  </g>
  <!-- Wallet front lip (covers bottom of main coin) -->
  <g filter="url(#lipShadow)">
    <path d="M12 68 L116 68 L116 106 Q116 114 108 114 L20 114 Q12 114 12 106 Z" fill="url(#walletGrad)"/>
  </g>
  <!-- Coin 3 (already inside wallet) -->
  <circle cx="90" cy="95" r="12" fill="url(#coinSmall)" stroke="#FFE082" stroke-width="1" opacity=".35"/>
  <text x="90" y="100" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#4E2E00" text-anchor="middle" opacity=".35">¥</text>
  <!-- Stitching detail -->
  <path d="M20 78 L108 78" stroke="#2A1A0E" stroke-width=".7" stroke-dasharray="3 3" opacity=".2"/>
  <path d="M20 90 L108 90" stroke="#2A1A0E" stroke-width=".7" stroke-dasharray="3 3" opacity=".2"/>
  <path d="M24 102 L104 102" stroke="#2A1A0E" stroke-width=".7" stroke-dasharray="3 3" opacity=".18"/>
</svg>
