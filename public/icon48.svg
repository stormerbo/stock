<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg48" x1="6" y1="3" x2="44" y2="45">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="wallet48" x1="4" y1="20" x2="44" y2="44">
      <stop offset="0" stop-color="#A08868"/>
      <stop offset=".4" stop-color="#7A5C3C"/>
      <stop offset="1" stop-color="#3D2B1A"/>
    </linearGradient>
    <radialGradient id="coin48" cx="40%" cy="32%" r="65%">
      <stop offset="0" stop-color="#FFFDE7"/>
      <stop offset=".2" stop-color="#FFE082"/>
      <stop offset=".45" stop-color="#FFB300"/>
      <stop offset=".75" stop-color="#FF8F00"/>
      <stop offset="1" stop-color="#BF360C"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="48" height="48" fill="url(#bg48)"/>
  <rect x="4" y="20" width="40" height="22" rx="7" fill="url(#wallet48)"/>
  <rect x="4" y="20" width="40" height="6" rx="2.5" fill="#2A1A0E" opacity=".6"/>
  <!-- Coin dropping in -->
  <circle cx="16" cy="11" r="7.5" fill="url(#coin48)" stroke="#FFE082" stroke-width=".7" transform="rotate(-15 16 11)"/>
  <text x="16" y="14" font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="700" fill="#4E2E00" text-anchor="middle" transform="rotate(-15 16 11)">¥</text>
  <!-- Main coin entering -->
  <circle cx="27" cy="20" r="9.5" fill="url(#coin48)" stroke="#FFE082" stroke-width=".8"/>
  <text x="27" y="24" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#4E2E00" text-anchor="middle">¥</text>
  <!-- Wallet front -->
  <path d="M4 26 L44 26 L44 37 Q44 42 39 42 L9 42 Q4 42 4 37 Z" fill="url(#wallet48)"/>
  <!-- Coin inside -->
  <circle cx="36" cy="34" r="5" fill="url(#coin48)" stroke="#FFE082" stroke-width=".5" opacity=".3"/>
  <text x="36" y="36" font-family="Arial,Helvetica,sans-serif" font-size="5" font-weight="700" fill="#4E2E00" text-anchor="middle" opacity=".3">¥</text>
</svg>
