<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
  <defs>
    <linearGradient id="bg16" x1="2" y1="1" x2="14.5" y2="15.5">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="wallet16" x1="1" y1="6" x2="15" y2="15">
      <stop offset="0" stop-color="#7A5C3C"/>
      <stop offset="1" stop-color="#3D2B1A"/>
    </linearGradient>
    <radialGradient id="coin16" cx="40%" cy="32%" r="65%">
      <stop offset="0" stop-color="#FFE082"/>
      <stop offset=".4" stop-color="#FFB300"/>
      <stop offset=".75" stop-color="#FF8F00"/>
      <stop offset="1" stop-color="#BF360C"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="16" height="16" fill="url(#bg16)"/>
  <!-- Wallet back -->
  <rect x="1" y="6" width="14" height="8" rx="3" fill="url(#wallet16)"/>
  <!-- Opening gap -->
  <rect x="1" y="6" width="14" height="2.5" rx="1" fill="#2A1A0E" opacity=".6"/>
  <!-- Coin entering (overlapping wallet opening) -->
  <circle cx="8" cy="5.5" r="4.5" fill="url(#coin16)" stroke="#FFE082" stroke-width=".4"/>
  <text x="8" y="7" font-family="Arial,Helvetica,sans-serif" font-size="5" font-weight="700" fill="#4E2E00" text-anchor="middle">¥</text>
  <!-- Wallet front lip (covers bottom of coin) -->
  <path d="M1 8.5 L15 8.5 L15 11 Q15 14 12 14 L4 14 Q1 14 1 11 Z" fill="url(#wallet16)"/>
</svg>
