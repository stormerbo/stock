                  - heading "自选基金助手" [level=1] [ref=e492]
                  - 'link "Permalink: 自选基金助手" [ref=e493] [cursor=pointer]':
                    - /url: "#自选基金助手"
                    - img [ref=e494]
                - paragraph [ref=e496]: 自选基金助手，实时查看您关注的基金，助您快速获取实时数据。
                - paragraph [ref=e497]: 可以用来查看您的自选基金的实时估值情况，可以自由的增减自选基金。您的自选基金数据会跟随账号同步。
                - generic [ref=e498]:
                  - heading "介绍" [level=2] [ref=e499]
                  - 'link "Permalink: 介绍" [ref=e500] [cursor=pointer]':
                    - /url: "#介绍"
                    - img [ref=e501]
                - paragraph [ref=e503]: 买了基金后，一直想找一款 pc 端的 chrome 扩展插件，毕竟股票的交易时间都是在工作日进行的，可惜找不到，便打算自己写一个，忍痛花费 5 美刀上架扩展商店。扩展的形式很适合上班族，不用打开网站，仅以小窗口的形式展示，不会引起 BOSS 的注意，方便上班摸鱼。
                - paragraph [ref=e504]: 首先输入基金代码添加基金，涨跌幅信息和收益信息可以以角标的形式展示在浏览器中，更加简便直观。可以在设置中单独开启显示份额与收益选项，在编辑中输入持有的份额，可以计算出每个基金的实时估值与收益，以及总收益。
                - generic [ref=e505]:
                  - heading "主要功能" [level=2] [ref=e506]
                  - 'link "Permalink: 主要功能" [ref=e507] [cursor=pointer]':
                    - /url: "#主要功能"
                    - img [ref=e508]
                - list [ref=e510]:
                  - listitem [ref=e511]: 实时角标提醒
                  - listitem [ref=e512]: 单个基金特别关注
                  - listitem [ref=e513]: 角标内容自定义，单个与全部基金，收益额与收益率
                  - listitem [ref=e514]: 支持标准与暗色两种主题
                  - listitem [ref=e515]: 基金列表与配置信息支持导入与导出
                  - listitem [ref=e516]: 智能判断节假日，切换休市状态
                  - listitem [ref=e517]: 支持设置份额或金额，查看当日估值收益
                  - listitem [ref=e518]: 支持设置持仓成本价，查看持有收益
                  - listitem [ref=e519]: 支持手动加仓减仓功能
                  - listitem [ref=e520]: 支持账号登录功能，方便跨平台同步
                  - listitem [ref=e521]: 交易日更新当日实际净值后，对应基金有 √ 提示
                  - listitem [ref=e522]: 支持查看估值走势图，净值、收益等走势图
                  - listitem [ref=e523]: 支持支持查看基金的股票持仓明细
                  - listitem [ref=e524]: 支持查看基金基本信息与基金经理信息
                  - listitem [ref=e525]: 支持基金分组功能
                  - listitem [ref=e526]: 自定义顶部指数内容
                  - listitem [ref=e527]: 自定义基金列表展示内容
                  - listitem [ref=e528]: 指数与基金拖拽排序功能
                  - listitem [ref=e529]: 基金按照指定项排序功能
                  - listitem [ref=e530]: 添加基金时支持按拼音、汉字、编码模糊搜索，支持批量添加
                  - listitem [ref=e531]: 行情中心展示，两市资金、行业板块、北向资金、南向资金
                - generic [ref=e532]:
                  - heading "截图识别导入功能推荐" [level=2] [ref=e533]
